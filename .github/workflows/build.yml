name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: "MSD 4PL Analysis.app"
            zip_name: MSD-4PL-Analysis-macOS.zip
          - os: windows-latest
            artifact: "dist/MSD 4PL Analysis.exe"
            zip_name: MSD-4PL-Analysis-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onedir --windowed \
            --name "MSD 4PL Analysis" \
            --hidden-import scipy.optimize \
            --hidden-import scipy.special \
            --hidden-import scipy.linalg \
            --hidden-import openpyxl \
            --hidden-import matplotlib.backends.backend_agg \
            --collect-all matplotlib \
            msd_4pl_analysis.py
          cd dist && zip -r "../${{ matrix.zip_name }}" "MSD 4PL Analysis.app"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed `
            --name "MSD 4PL Analysis" `
            --hidden-import scipy.optimize `
            --hidden-import scipy.special `
            --hidden-import scipy.linalg `
            --hidden-import openpyxl `
            --hidden-import matplotlib.backends.backend_agg `
            --collect-all matplotlib `
            msd_4pl_analysis.py
          Compress-Archive -Path "dist\MSD 4PL Analysis.exe" -DestinationPath "${{ matrix.zip_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}
