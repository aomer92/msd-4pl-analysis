name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            zip_name: MSD-4PL-Analysis-macOS.zip
          - os: windows-latest
            zip_name: MSD-4PL-Analysis-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── macOS build ────────────────────────────────────────────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onedir --windowed \
            --name "MSD 4PL Analysis" \
            --hidden-import scipy.optimize \
            --hidden-import scipy.special \
            --hidden-import scipy.linalg \
            --hidden-import openpyxl \
            --hidden-import matplotlib.backends.backend_agg \
            --hidden-import plotly \
            --hidden-import plotly.graph_objects \
            --hidden-import plotly.offline \
            --hidden-import plotly.io \
            --hidden-import plotly.validators \
            --hidden-import plotly.basedatatypes \
            --hidden-import plotly.colors \
            --collect-all matplotlib \
            msd_4pl_analysis.py
          cd dist && zip -r "../${{ matrix.zip_name }}" "MSD 4PL Analysis.app"

      # ── Windows build ──────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "MSD 4PL Analysis" `
            --hidden-import scipy.optimize `
            --hidden-import scipy.special `
            --hidden-import scipy.linalg `
            --hidden-import openpyxl `
            --hidden-import matplotlib.backends.backend_agg `
            --hidden-import plotly `
            --hidden-import plotly.graph_objects `
            --hidden-import plotly.offline `
            --hidden-import plotly.io `
            --hidden-import plotly.validators `
            --hidden-import plotly.basedatatypes `
            --hidden-import plotly.colors `
            --collect-all matplotlib `
            msd_4pl_analysis.py
          Compress-Archive -Path "dist\MSD 4PL Analysis.exe" -DestinationPath "${{ matrix.zip_name }}"

      # ── Upload to GitHub Release ───────────────────────────────────────
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MSD 4PL Analysis ${{ github.ref_name }}"
          body: |
            ## MSD 4PL Analysis Tool ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `MSD-4PL-Analysis-Windows.zip` → extract and run `MSD 4PL Analysis.exe` |
            | macOS    | `MSD-4PL-Analysis-macOS.zip` → extract and open `MSD 4PL Analysis.app` |

            > **In-app updates:** The app will automatically notify you when a newer release is available.
          files: ${{ matrix.zip_name }}
          draft: false
          prerelease: false
