name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy openpyxl matplotlib plotly pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "MSD_4PL_Analysis" `
            --hidden-import scipy.optimize `
            --hidden-import scipy.special `
            --hidden-import scipy.linalg `
            --hidden-import openpyxl `
            --hidden-import matplotlib.backends.backend_agg `
            --hidden-import plotly `
            --hidden-import plotly.graph_objects `
            --hidden-import plotly.offline `
            --hidden-import plotly.io `
            --hidden-import plotly.validators `
            --hidden-import plotly.basedatatypes `
            --hidden-import plotly.colors `
            --collect-all matplotlib `
            msd_4pl_analysis.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSD_4PL_Analysis_Windows
          path: dist/MSD_4PL_Analysis.exe
          retention-days: 90
